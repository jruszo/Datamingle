<!DOCTYPE html>
<html>
<head>
    <title>Archery - Two-Factor Authentication</title>
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Include Bootstrap -->
    <link href="{% static 'bootstrap/css/bootstrap.min.css' %}" rel="stylesheet">
    <link href="{% static 'bootstrap-select/css/bootstrap-select.min.css' %}" rel="stylesheet">
    <link href="{% static 'dist/css/login.css' %}" rel="stylesheet">

    <!-- HTML5 Shim and Respond.js for IE8 support of HTML5 elements and media queries -->
    <!-- Note: Respond.js does not work when loaded via file:// -->
    <!--[if lt IE 9]>
         <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
         <script src="https://oss.maxcdn.com/libs/respond.js/1.3.0/respond.min.js"></script>
      <![endif]-->
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}" />
</head>
<body onload="document.getElementById('otpCode').focus()" style="background-color:#edeff1;">
<div class="row lsb-login">
    <div class="col-sm-3 login-form-wrapper">
        <form class="login-form fade-in-effect" id="auth" method="post" role="form">
            {% csrf_token %}
            {% if verify_mode == 'verify_config' %}
                <div class="form-group">
                    <h4 style="font-weight: bold">Enable Two-Factor Authentication</h4>
                </div>
                <div class="form-group">
                    <label for="auth_type">Verification method:</label>
                    <select id="auth_type" class="form-control show-tick selectpicker" name="auth_type"
                            title="Select additional verification method:"
                            data-live-search="true">
                        <option value="totp" selected="selected">Google Authenticator</option>
                        <option value="sms">SMS code</option>
                    </select>
                </div>

                <div id="totp-form" class="form-group" style="display: grid">
                    <label class="control-label" for="qrcode-img">1. Scan with Google Authenticator:</label>
                    <img id="qrcode-img" key="" src="" style="width: 100%;height: auto;">
                </div>
                <div id="sms-form" class="form-group" style="display:none;">
                    <label class="control-label" for="phone">1. Enter the phone number to bind:</label>
                    <input class="form-control ng-valid ng-dirty ng-touched" id="phone" name="phone" type="text"
                           oninput="value=value.replace(/[^\d]/g,'')" autocomplete="off" required>
                </div>
                <div class="form-group">
                    <label class="control-label" for="otpCode">2. Enter the 6-digit code to verify:</label>
                    <input class="form-control ng-valid ng-dirty ng-touched" id="otpCode" name="otpCode" type="text"
                           oninput="value=value.replace(/[^\d]/g,'')" autocomplete="off" required>
                </div>
                <div class="form-group" style="text-align: center">
                    <button id="btnCaptcha" type="button" class="btn btn-primary btn-block" style="display: none">Get code</button>
                    <button id="btnAuth" type="button" class="btn btn-success btn-block"><i class="fa-lock"></i>Verify</button>
                </div>
            {% else %}
                <div class="form-group">
                    <label for="auth_type">Select verification method:</label>
                    <select id="auth_type" class="form-control show-tick selectpicker" name="auth_type"
                            title="Select additional verification method:"
                            data-live-search="true">
                    </select>
                </div>
                <div class="form-group">
                    <label id="totp-form" class="control-label" for="otpCode">OTP code</label>
                    <label id="sms-form" class="control-label" for="otpCode">SMS code</label>
                    <input class="form-control ng-valid ng-dirty ng-touched" id="otpCode" name="otpCode" type="text"
                           oninput="value=value.replace(/[^\d]/g,'')" autocomplete="off" required>
                </div>
                <input id="phone" value="{{ phone }}" style="display: none">
                <div class="form-group">
                    <button id="btnCaptcha" type="button" class="btn btn-primary btn-block" >Get code</button>
                    <button id="btnAuth" type="button" class="btn btn-success btn-block"><i class="fa-lock"></i>Verify</button>
                </div>
            {% endif %}
            <input type="text" style="display:none">
        </form>
    </div>
</div>

<!-- Footer -->
<div class="user-bottom-div">
    <p><strong>&copy; Archery</strong>&nbsp;(v{{ archery_version }})</p>
</div>
<script src="{% static 'jquery/jquery.min.js' %}"></script>
<script src="{% static 'bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'bootstrap-select/js/bootstrap-select.min.js' %}"></script>
<script src="{% static 'bootstrap-select/js/i18n/defaults-zh_CN.min.js' %}"></script>
<script src="{% static 'dist/js/utils.js' %}"></script>
</body>
<!-- CSRF helper -->
<script>
    $(function () {
        $.ajaxSetup({
            headers: {"X-CSRFToken": getCookie("csrftoken")}
        });
    });

    function getCookie(name) {
        var cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            var cookies = document.cookie.split(';');
            for (var i = 0; i < cookies.length; i++) {
                var cookie = jQuery.trim(cookies[i]);
                // Does this cookie string begin with the name we want?
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
<script>

    // Submit verification on Enter key
    $(document).ready(function () {
        $(document).keydown(function (event) {
            // keyCode 13 is Enter
            if (event.keyCode === 13) {
                let otp = $('#otpCode').val();
                if (!otp) {
                    alert('Please enter the verification code.')
                    return
                }
                authOTP(otp);
            }
        });
    });

    $(document).ready(function () {
        if ('{{ verify_mode }}' === 'verify_config') {
            let data = config_2fa();
            $("#qrcode-img").attr("key", data.data.key)
            $("#qrcode-img").attr("src", "/user/qrcode/" + data.data.key)
        } else if ('{{ verify_mode }}' === 'verify_only') {
            let auth_types = {{ auth_types|safe }};
            for (i=0;i < auth_types.length;i++) {
                let auth_type;
                if (i === 0) {
                    auth_type = '<option value="' + auth_types[i].code + '" selected="selected">' + auth_types[i].display + '</option>'
                } else {
                    auth_type = '<option value="' + auth_types[i].code + '">' + auth_types[i].display + '</option>'
                }
                $("#auth_type").append(auth_type)
                $("#auth_type").trigger('change')
            }
        }
    })

    $('#btnAuth').click(function () {
        let otp = $('#otpCode').val();
        if (!otp) {
            alert('Please enter the verification code.')
            return
        }
        authOTP(otp);
    });

    $("#btnCaptcha").click(function () {
        if ('{{ verify_mode }}' === 'verify_config') {
            let phone = $("#phone").val();
            if (!phone) {
                alert('Please enter the phone number.')
                return
            }
        }
        let data = config_2fa();
        if (data.status === 0) {
            init_countdown(this);
            alert('Verification code sent. Valid for 5 minutes.')
        }
    })

    $("#auth_type").change(function () {
        $("#otpCode").val('');
        let auth_type = $("#auth_type").val();
        if (auth_type === 'totp') {
            $("#totp-form").show();
            $("#sms-form").hide();
            $("#btnCaptcha").hide()
        } else if (auth_type === 'sms') {
            $("#totp-form").hide();
            $("#sms-form").show();
            $("#btnCaptcha").show()
        }
    })

    function config_2fa() {
        // Configure 2FA
        let result;
        $.ajax({
            type: "post",
            url: "/api/v1/user/2fa/",
            dataType: "json",
            data: {
                engineer: '{{ username }}',
                enable: 'true',
                auth_type: $("#auth_type").val(),
                phone: $("#phone").val()
            },
            async: false,
            complete: function () {
            },
            success: function (data) {
                result = data
                if (data.status !== 0) {
                    alert(data.msg);
                }
            },
            error: function (XMLHttpRequest, textStatus, errorThrown) {
                alert(errorThrown + ' : ' + XMLHttpRequest.responseText);
            }
        })
        return result
    }

    function save() {
        $.ajax({
            type: "post",
            url: "/api/v1/user/2fa/save/",
            dataType: "json",
            headers: {"X-CSRFToken": getCookie("csrftoken")},
            data: {
                engineer: '{{ username }}',
                auth_type: $("#auth_type").val(),
                key: $("#qrcode-img").attr('key'),
                phone: $("#phone").val()
            },
            async: false,
            complete: function () {
            },
            success: function (data) {
                if (data.status === 0) {
                    alert("Two-factor authentication is now enabled.");
                } else {
                    alert(data.msg)
                }
            },
            error: function (XMLHttpRequest, textStatus, errorThrown) {
                alert(errorThrown + ' : ' + XMLHttpRequest.responseText)
            }
        });
    }

    function authOTP(otp) {
        $.ajax({
            type: "post",
            url: "/api/v1/user/2fa/verify/",
            dataType: "json",
            data: {
                engineer: '{{ username }}',
                auth_type: $("#auth_type").val(),
                otp: otp,
                key: $("#qrcode-img").attr('key'),
                phone: $("#phone").val()
            },
            complete: function () {
            },
            success: function (data) {
                if (data.status === 0) {
                    if ('{{ verify_mode }}' === 'verify_config') {
                        save();
                    }
                    $(location).attr('href', '/index/');
                } else {
                    alert(data.msg)
                }
            },
            error: function (XMLHttpRequest, textStatus, errorThrown) {
                alert(errorThrown + ' : ' + XMLHttpRequest.responseText)
            }
        });
    }
</script>
</html>
