{% extends "base.html" %}

{% block content %}
    <ul class="breadcrumb">
        <li><a href="/group/">Resource Group</a></li>
        <li class="active">Related Objects</li>
    </ul>
    <!-- Custom action buttons -->
    <div id="toolbar" class="form-inline">
        <div class="form-group">
            <select id="type" class="form-control selectpicker">
                <option value="" selected="selected">All</option>
                <option value=0>User</option>
                <option value=1>Instance</option>
            </select>
        </div>
        <div class="form-group ">
            <button id="btn_add" type="button" class="btn btn-default" data-toggle="modal" data-target="#add">
                <span class="glyphicon glyphicon-plus" aria-hidden="true"></span>
                Add Related Object
            </button>
        </div>
    </div>
    <!-- Table -->
    <div class="table-responsive">
        <table id="group-list" data-toggle="table" class="table table-striped table-hover"
               style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        </table>
    </div>
    <!-- Relation management -->
    <div class="modal fade" id="add" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title" id="myModalLabel">Add Related Object</h4>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <input type="text" class="form-control" id="group_name" value="{{ group.group_name }}" disabled
                               placeholder="Group">
                    </div>
                    <div class="form-group">
                        <select id="object_type" name="object_type"
                                class="selectpicker show-tick form-control bs-select-hidden"
                                data-name="Related Object Type" data-placeholder="Please select related object type:" data-live-search="true" required>
                            <option value="is-empty" disabled="" selected="selected">Please select related object type:</option>
                            <option value=0>User</option>
                            <option value=1>Instance</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="object_info" name="object_info" data-live-search="true" multiple="multiple"
                                class="form-control selectpicker show-tick bs-select-hidden ">
                            <option value="is-empty" disabled="" selected="selected">Please select related object:</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="addRelation()">Submit</button>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
{% block js %}
    {% load static %}
    <script src="{% static 'bootstrap-table/js/bootstrap-table-export.min.js' %}"></script>
    <script src="{% static 'bootstrap-table/js/tableExport.min.js' %}"></script>
    <script>
        // Get list data.
        function groupmgmt() {
            // Use async request.
            // Initialize table.
            $('#group-list').bootstrapTable('destroy').bootstrapTable({
                escape: true,
                method: 'post',
                contentType: "application/x-www-form-urlencoded",
                url: "/group/relations/",
                striped: true,                      // Show row stripe.
                cache: false,                       // Disable cache.
                pagination: true,                   // Enable pagination.
                sortable: true,                     // Enable sorting.
                sortOrder: "asc",                   // Sort order.
                sidePagination: "server",           // Server-side pagination.
                pageNumber: 1,                      // Initial page number.
                pageSize: 20,                       // Rows per page.
                pageList: [20, 30, 50, 100],        // Page size options.
                showExport: true,                   // Show export button.
                exportOptions: {
                    fileName: 'group'  // Export file name.
                },
                search: true,                       // Enable table search.
                strictSearch: false,                // Use fuzzy search.
                showColumns: true,                  // Show column selector.
                showRefresh: true,                  // Show refresh button.
                minimumCountColumns: 2,             // Minimum visible columns.
                clickToSelect: true,                // Enable row selection.
                uniqueId: "id",                     // Unique row identifier.
                showToggle: true,                   // Show list/card toggle.
                cardView: false,                    // Disable card view.
                detailView: false,                  // Disable detail view.
                locale: 'en-US',                    // Localization.
                toolbar: "#toolbar",                // Custom toolbar selector.
                queryParamsType: 'limit',
                // Request parameters sent to backend.
                queryParams:
                    function (params) {
                        return {
                            limit: params.limit,
                            offset: params.offset,
                            group_id: parseInt({{ group.group_id }}),
                            type: $("#type").val(),
                            search: params.search
                        }
                    },
                columns: [{
                    title: 'Related Object Description',
                    field: 'object_name',
                    formatter: function (value, row, index) {
                        switch (row.object_type) {
                            case 0:
                                return "<a href=\"/admin/sql/users/" + row.object_id + "/change/\">" + row.object_name + "</a>";
                                break;
                            case 1:
                                return "<a href=\"/admin/sql/instance/" + row.object_id + "/change/\">" + row.object_name + "</a>";
                                break;
                            default:
                                return "Unknown"
                        }
                    }
                }, {
                    title: 'Related Object Type',
                    field: 'object_type',
                    formatter: function (value, row, index) {
                        switch (value) {
                            case 0:
                                return "User";
                                break;
                            case 1:
                                return "Instance";
                                break;
                            default:
                                return "Unknown"
                        }
                    }
                }, {
                    title: 'Resource Group',
                    field: 'group_name'
                }
                ],
                onLoadSuccess: function () {
                },
                onLoadError: onLoadErrorCallback,
                onSearch: function (e) {
                    // Send search parameters to server.
                    queryParams(e)
                }
            });

        }

        // Initialize select control.
        $("#object_info").selectpicker({
            actionsBox: true, // Add select-all and deselect-all actions.
            countSelectedText: "{0} selected",
            selectedTextFormat: "count > 5"
        });

        // Get unassociated object info.
        $("#object_type").change(function () {
            var group_id = parseInt({{ group.group_id }});
            var object_type = $("#object_type").val();
            $.ajax({
                type: "post",
                url: "/group/unassociated/",
                dataType: "json",
                data: {
                    group_id: group_id,
                    object_type: object_type
                },
                complete: function () {
                },
                success: function (data) {
                    if (data.status === 0) {
                        var result = data.rows;
                        $("#object_info").empty();
                        for (var i = 0; i < result.length; i++) {
                            var name = "<option value=\"" + result[i]['object_id'] + "," + result[i]['object_name'] + "\">" + result[i]['object_name'] + "</option>";
                            $("#object_info").append(name);
                        }
                        $('#object_info').selectpicker('render');
                        $('#object_info').selectpicker('refresh');
                    } else {
                        alert(data.msg)
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {
                    alert(errorThrown);
                }
            });
        });

        // Add object relation.
        function addRelation() {
            var group_id = parseInt({{ group.group_id }});
            var object_type = $("#object_type").val();
            var object_info = $("#object_info").val();
            if (group_id && object_type && object_info) {
                $.ajax({
                    type: "post",
                    url: "/group/addrelation/",
                    dataType: "json",
                    data: {
                        group_id: group_id,
                        object_type: object_type,
                        object_info: JSON.stringify(object_info)
                    },
                    complete: function () {
                        $('button[type=button]').removeClass('disabled');
                        $('button[type=button]').prop('disabled', false);
                    },
                    success: function (data) {
                        if (data.status === 0) {
                            $('#apply').modal('hide');
                            window.location.reload(true);
                        } else {
                            alert(data.msg)
                        }
                    },
                    error: function (XMLHttpRequest, textStatus, errorThrown) {
                        alert(errorThrown);
                    }
                });
            } else {
                alert('Please complete all fields!')
            }

        }

        // Auto-refresh on status filter change.
        $("#type").change(function () {
            groupmgmt();
        });

        // Initialize data.
        $(document).ready(function () {
            groupmgmt();
        });
    </script>
{% endblock %}
