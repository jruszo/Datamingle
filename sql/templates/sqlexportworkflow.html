{% extends "base.html" %}

{% block content %}
    <!-- Custom action buttons -->
    <div id="toolbar" class="form-inline pull-left">
        <div class="form-group">
            <select id="navStatus" class="form-control selectpicker">
                <option value="" selected="selected">Status</option>
                {% for status, status_display in status_list %}
                    <option value="{{ status }}">{{ status_display }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <select id="instance_id" class="form-control selectpicker"
                    data-live-search="true">
                <option value="" selected="selected">Instance</option>
                {% for ins in instance %}
                    <option value="{{ ins.id }}">{{ ins.instance_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <select id="group_id" class="form-control selectpicker"
                    data-live-search="true">
                <option value="" selected="selected">Group</option>
                {% for rgp in resource_group %}
                    <option value="{{ rgp.group_id }}">{{ rgp.group_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class='form-group'>
            <div id="reservation" class="form-control"
                 style="background: #fff; cursor: pointer; padding: 5px 10px; border: 1px solid #ccc; width: 100%">
                <i class="fa fa-calendar"></i>&nbsp;
                <span></span> <i class="fa fa-caret-down"></i>
            </div>
        </div>
        <div class="form-group ">
            {% if storage_type %}
                {% if can_offline_download == 1 %}
                    <button id="btn_exportsubmit" type="button" class="btn btn-default" onclick="window.location.href='/sqlexportsubmit/'">
                        <span class="glyphicon glyphicon-plus" aria-hidden="true"></span>
                        Submit Export Workflow
                    </button>
                {% endif %}
            {% endif %}
        </div>
    </div>
    <!-- Review list table -->
    <div class="table-responsive">
        <table id="sqlaudit-list" data-toggle="table" class="table table-striped table-hover"
               style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></table>
    </div>
    <!-- Log modal -->
    <div class="modal fade" id="logs">
        <div class="modal-dialog">
            <div class="modal-content message_align">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">×</span></button>
                    <h4 class="modal-title text-danger">Workflow Log</h4>
                </div>
                <div class="modal-body">
                    <div class="table-responsive">
                        <table id="log-list" data-toggle="table" class="table table-striped table-hover"
                               style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                        </table>
                    </div>
                </div>
                <div class="modal-footer">
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
{% block js %}
    {% load static %}
    <link href="{% static 'daterangepicker/css/daterangepicker.css' %}" rel="stylesheet" type="text/css"/>
    <script src="{% static 'daterangepicker/js/moment.min.js' %}"></script>
    <script src="{% static 'daterangepicker/js/daterangepicker.js' %}"></script>
    <script src="{% static 'bootstrap-table/js/bootstrap-table-export.min.js' %}"></script>
    <script src="{% static 'bootstrap-table/js/tableExport.min.js' %}"></script>
    <script>
        // Initialize date range picker.
        $(function () {
            let start = moment().subtract(29, 'days');
            let end = moment();

            function cb(start, end) {
                if (start.isValid() && end.isValid() && start.dayOfYear()!=1) {
                    $('#reservation span').html(start.format('YYYY-MM-DD') + ' - ' + end.format('YYYY-MM-DD'));
                } else {
                    $('#reservation span').html('All data');
                }
            }

            $('#reservation').daterangepicker({
                startDate: start,
                endDate: end,
                showDropdowns: true,
                locale: {
                    format: "YYYY-MM-DD",// Display format.
                    separator: " / ",// Separator between dates.
                    applyLabel: "Apply",
                    cancelLabel: "Cancel",
                    fromLabel: "From",
                    toLabel: "To",
                    customRangeLabel: "Custom",
                    daysOfWeek: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
                    monthNames: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"],
                    firstDay: 1
                },
                ranges: {
                    "All": [moment({ year: 1970 }),moment()],
                    "Today": [moment().startOf('day'), moment()],
                    "Yesterday": [moment().subtract('days', 1).startOf('day'), moment().subtract('days', 1).endOf('day')],
                    "Last 7 Days": [moment().subtract('days', 6), moment()],
                    "Last 30 Days": [moment().subtract('days', 29), moment()],
                    "This Month": [moment().startOf("month"), moment().endOf("month")],
                    "Last Month": [moment().subtract(1, "month").startOf("month"), moment().subtract(1, "month").endOf("month")]
                }
            }, cb).on('apply.daterangepicker', function (ev, picker) {
                get_workflow_list()
            });
            cb(start, end);
        });

    </script>
    <script>
        // Get SQL workflow list.
        function get_workflow_list() {
            // Use async request.
            // Initialize table.
            $('#sqlaudit-list').bootstrapTable('destroy').bootstrapTable({
                escape: true,
                method: 'post',
                contentType: "application/x-www-form-urlencoded",
                url: "/sqlworkflow_list/",
                striped: true,                      // Show row stripe.
                cache: false,                       // Disable cache.
                pagination: true,                   // Enable pagination.
                sortable: true,                     // Enable sorting.
                sortOrder: "asc",                   // Sort order.
                sidePagination: "server",           // Server-side pagination.
                pageNumber: 1,                      // Initial page number.
                pageSize: 20,                       // Rows per page.
                pageList: [20, 30, 50, 100],        // Page size options.
                showExport: true,                   // Show export button.
                exportOptions: {
                    fileName: 'sqlworkflow'  // Export file name.
                },
                search: true,                       // Enable table search.
                strictSearch: false,                // Use fuzzy search.
                showColumns: true,                  // Show column selector.
                showRefresh: true,                  // Show refresh button.
                minimumCountColumns: 2,             // Minimum visible columns.
                clickToSelect: true,                // Enable row selection.
                uniqueId: "id",                     // Unique row identifier.
                showToggle: true,                   // Show list/card toggle.
                cardView: false,                    // Disable card view.
                detailView: false,                  // Disable detail view.
                locale: 'en-US',                    // Localization.
                toolbar: "#toolbar",                // Custom toolbar selector.
                queryParamsType: 'limit',
                // Request parameters sent to backend.
                queryParams:
                    function (params) {
                        let start_date = $("#reservation").data('daterangepicker').startDate;
                        let end_date = $("#reservation").data('daterangepicker').endDate;
                        if (start_date.isValid() && end_date.isValid()) {
                            start_date = start_date.format('YYYY-MM-DD');
                            end_date = end_date.format('YYYY-MM-DD')
                        } else {
                            start_date = '';
                            end_date = ''
                        }
                        return {
                            "syntax_type":[3], // Data export workflow type.
                            limit: params.limit,
                            offset: params.offset,
                            navStatus: $("#navStatus").val(),
                            instance_id: $("#instance_id").val(),
                            group_id: $("#group_id").val(),
                            start_date: start_date,
                            end_date: end_date,
                            search: params.search
                        }
                    },
                columns: [{
                    title: 'Workflow Name',
                    field: 'workflow_name',
                    formatter: function (value, row, index) {
                        var span = document.createElement('span');
                        span.setAttribute('title', value);
                        if (value.length > 20) {
                            span.innerHTML = "<a href=\"/detail/" + row.id + "/\">" + value.substr(0, 20) + '...';
                            +"</a>";
                        } else {
                            span.innerHTML = "<a href=\"/detail/" + row.id + "/\">" + value + "</a>";
                        }
                        return span.outerHTML;
                    }
                }, {
                    title: 'Full Workflow Name',
                    field: 'workflow_name',
                    visible: false // Hidden by default.
                }, {
                    title: 'Type',
                    field: 'syntax_type',
                    formatter: function (value, row, index) {
                        if (String(value) === '0') {
                            return 'Other'
                        } else if (String(value) === '1') {
                            return 'DDL'
                        } else if (String(value) === '2') {
                            return 'DML'
                        } else if (String(value) === '3') {
                            if (String(row.export_format) === 'csv') {
                                row.export_format = 'CSV'
                            } else if (String(row.export_format) === 'xlsx') {
                                row.export_format = 'Excel'
                            } else if (String(row.export_format) === 'sql') {
                                row.export_format = 'SQL'
                            } else if (String(row.export_format) === 'json') {
                                row.export_format = 'JSON'
                            } else if (String(row.export_format) === 'xml') {
                                row.export_format = 'XML'
                            }
                            return 'Data Export: ' + row.export_format
                        }
                    }
                }, {
                    title: 'Requester',
                    field: 'engineer_display'
                }, {
                    title: 'Workflow Status',
                    field: 'status',
                    formatter: function (value, row, index) {
                        return sqlworkflowStatus_formatter(value)
                    }
                }, {
                    title: 'Create Time',
                    field: 'create_time'
                }, {
                    title: 'Target Instance',
                    field: 'instance__instance_name'
                }, {
                    title: 'Database',
                    field: 'db_name'
                }, {
                    title: 'Group',
                    field: 'group_name'
                }, {
                    title: 'Action',
                    field: 'operation',
                    formatter: function (value, row, index) {
                        return "<button class=\"btn btn-info btn-xs\" workflow_id=\"" + row.id + "\"\n" + "onclick=\"getLog(this)\" >Operation Log\n" + "</button>"
                    }
                }],
                onLoadSuccess: function () {
                },
                onLoadError: onLoadErrorCallback,
                onSearch: function (e) {
                    // Send search parameters to server.
                    queryParams(e)
                },
                responseHandler: function (res) {
                    // Transform data before rendering table.
                    return res;
                }
            });

        }

        // Get operation log.
        function getLog(obj) {
            var workflow_id = $(obj).attr("workflow_id");
            var workflow_type = 2;
            $.ajax({
                type: "post",
                url: "/workflow/log/",
                dataType: "json",
                data: {
                    workflow_id: workflow_id,
                    workflow_type: workflow_type,
                },
                complete: function () {
                },
                success: function (data) {
                    // Initialize table.
                    $('#logs').modal('show');
                    $('#log-list').bootstrapTable('destroy').bootstrapTable({
                        escape: true,
                        striped: true,                      // Show row stripe.
                        cache: false,                       // Disable cache.
                        pagination: false,                  // Disable pagination.
                        sortable: false,                    // Disable sorting.
                        sortOrder: "asc",                   // Sort order.
                        sidePagination: "client",           // Client-side pagination.
                        pageNumber: 1,                      // Initial page number.
                        pageSize: 20,                       // Rows per page.
                        pageList: [20, 30, 50, 100],        // Page size options.
                        search: false,                      // Disable table search.
                        strictSearch: false,                // Use fuzzy search.
                        showColumns: false,                 // Hide column selector.
                        showRefresh: false,                 // Hide refresh button.
                        minimumCountColumns: 2,             // Minimum visible columns.
                        clickToSelect: false,               // Disable row selection.
                        uniqueId: "id",                     // Unique row identifier.
                        showToggle: false,                  // Hide list/card toggle.
                        cardView: false,                    // Disable card view.
                        detailView: false,                  // Disable detail view.
                        locale: 'en-US',                    // Localization.
                        data: data.rows,
                        columns: [{
                            title: 'Operation',
                            field: 'operation_type_desc'
                        }, {
                            title: 'Operator',
                            field: 'operator_display'
                        }, {
                            title: 'Operation Time',
                            field: 'operation_time'
                        }, {
                            title: 'Operation Info',
                            field: 'operation_info'
                        }],
                        onLoadSuccess: function () {
                        },
                        onLoadError: onLoadErrorCallback
                    });
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {
                    alert(errorThrown);
                }
            })
        }

        // Auto-refresh on filter changes.
        $("#navStatus").change(function () {
            get_workflow_list();
        });

        $("#instance_id").change(function () {
            get_workflow_list();
        });

        $("#group_id").change(function () {
            get_workflow_list();
        });

        // Initialize data.
        $(document).ready(function () {
            get_workflow_list();
        });
    </script>
{% endblock %}
