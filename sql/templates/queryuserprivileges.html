{% extends "base.html" %}

{% block content %}
    <ul class="breadcrumb">
        <li><a href="/queryapplylist/">Request List</a></li>
        <li class="active">Permission Management</li>
    </ul>
    <!-- Custom action buttons -->
    <div id="toolbar" class="bootstrap-select">
        <div class="form-group">
            <select id=user_display class="form-control selectpicker show-tick bs-select-hidden "
                    name="user_display_list"
                    data-live-search="true">
                <option value="all" selected="selected">All</option>
                {% if user.is_superuser %}
                    {% for user in user_list %}
                        <option value="{{ user.user_display }}">{{ user.user_display }}</option>
                    {% endfor %}
                {% else %}
                    <option value="{{ user.user_display }}">{{ user.user_display }}</option>
                {% endif %}
            </select>
        </div>
    </div>
    <!-- Permission info table -->
    <div class="table-responsive">
        <table id="privileges-list" data-toggle="table" class="table table-striped table-hover"
               style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        </table>
    </div>
    <!-- Modify operation -->
    <div class="modal fade" id="modify_privileges" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title" id="myModalLabel">Permission Update</h4>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label><span class="text-danger">*</span> Please enter result limit</label>
                        <input type="text" class="form-control" id="limit_num"
                               placeholder="Used to limit rows displayed in online query results">
                    </div>
                    <div class="form-group">
                        <input hidden id="privilege_id">
                        <label><span class="text-danger">*</span> Please select expiration date</label>
                        <input type="date" class="form-control" id="valid_date" placeholder="Permission is revoked automatically after expiration">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="modifyqueryprivileges(2)">Confirm Update</button>
                </div>
            </div>
        </div>
    </div>
    <!-- Delete confirmation -->
    <div class="modal fade" id="deleted_privileges">
        <div class="modal-dialog">
            <div class="modal-content message_align">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">×</span></button>
                    <h4 class="modal-title text-danger">Notice</h4>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="privilege_id">
                    <p>After deletion, the user will no longer be able to query data. Confirm deletion?</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-info" data-dismiss="modal">Cancel</button>
                    <button type="button" onclick="modifyqueryprivileges(1)" class="btn btn-danger">Confirm Delete</button>
                </div>
            </div>
        </div>
    </div>

{% endblock content %}

{% block js %}
    {% load static %}
    <script src="{% static 'bootstrap-table/js/bootstrap-table-export.min.js' %}"></script>
    <script src="{% static 'bootstrap-table/js/tableExport.min.js' %}"></script>
    <script>
        // Initialize list.
        function queryuserprivileges() {
            // Initialize table.
            $('#privileges-list').bootstrapTable('destroy').bootstrapTable({
                escape: true,
                method: 'post',
                contentType: "application/x-www-form-urlencoded",
                url: "/query/userprivileges/",
                striped: true,                      // Show row stripe.
                cache: false,                       // Disable cache.
                pagination: true,                   // Enable pagination.
                sortable: true,                     // Enable sorting.
                sortOrder: "asc",                   // Sort order.
                sidePagination: "server",           // Server-side pagination.
                pageNumber: 1,                      // Initial page number.
                pageSize: 20,                       // Rows per page.
                pageList: [20, 30, 50, 100],        // Page size options.
                search: true,                       // Enable table search.
                strictSearch: false,                // Use fuzzy search.
                showColumns: true,                  // Show column selector.
                showRefresh: true,                  // Show refresh button.
                minimumCountColumns: 2,             // Minimum visible columns.
                clickToSelect: true,                // Enable row selection.
                uniqueId: "id",                     // Unique row identifier.
                showToggle: true,                   // Show list/card toggle.
                cardView: false,                    // Disable card view.
                detailView: false,                  // Disable detail view.
                showExport: true,                   // Show export button.
                exportOptions: {
                    ignoreColumn: [0, -1],  // Ignored column indexes.
                    fileName: 'userprivileges'  // Export file name.
                },
                locale: 'en-US',                    // Localization.
                toolbar: "#toolbar",                // Custom toolbar selector.
                queryParamsType: 'limit',
                // Request parameters sent to backend.
                queryParams:
                    function (params) {
                        return {
                            user_display: $("#user_display").val(),
                            limit: params.limit,
                            offset: params.offset,
                            search: params.search
                        }
                    },
                columns: [{
                    title: 'User',
                    field: 'user_display'
                }, {
                    title: 'Instance',
                    field: 'instance__instance_name'
                }, {
                    title: 'Database',
                    field: 'db_name'
                }, {
                    title: 'Permission Level',
                    field: 'priv_type',
                    formatter: function (value, row, index) {
                        if (String(value) === '1') {
                            return 'DATABASE';
                        } else {
                            return 'TABLE';
                        }
                    }
                }, {
                    title: 'Table',
                    field: 'table_name'
                }, {
                    title: 'Result Rows',
                    field: 'limit_num'
                }, {
                    title: 'Valid Until',
                    field: 'valid_date'
                }, {
                    title: 'Action',
                    field: 'privilege_id',
                    formatter: function (value, row, index) {
                        {% if perms.sql.query_mgtpriv %}
                            return "<button class=\"btn btn-warning btn-xs\" privilege_id=\"" + row.privilege_id + "\"\n" +
                                "limit_num=\"" + row.limit_num + "\"\n" +
                                "valid_date=\"" + row.valid_date + "\"\n" + "onclick=\"setInfo(this)\" " +
                                "data-toggle=\"modal\" data-target=\"#modify_privileges\">Update\n" + "</button>\n" +
                                "<button class=\"btn btn-danger btn-xs\" privilege_id=\"" + row.privilege_id + "\"\n" +
                                "limit_num=\"" + row.limit_num + "\"\n" +
                                "valid_date=\"" + row.valid_date + "\"\n" + "onclick=\"setInfo(this)\" " +
                                "data-toggle=\"modal\" data-target=\"#deleted_privileges\">Delete Permission\n" + "</button>"
                        {% endif %}
                    }
                }],
                onLoadSuccess: function () {
                },
                onLoadError: onLoadErrorCallback,
                onSearch: function (e) {
                    // Send search parameters to server.
                    queryParams(e)
                },
                responseHandler: function (res) {
                    // Transform data before rendering table.
                    return res;
                }
            });

        }

        // User filter.
        $("#user_display").change(function () {
            queryuserprivileges()
        });

        // Populate modal values.
        function setInfo(obj) {
            $("#privilege_id").val($(obj).attr("privilege_id"));
            $("#limit_num").val($(obj).attr("limit_num"));
            $("#valid_date").val($(obj).attr("valid_date"));
        }

        // Update permissions.
        function modifyqueryprivileges(type) {
            var privilege_id = $("#privilege_id").val();
            var valid_date = $("#valid_date").val();
            var limit_num = $("#limit_num").val();
            if (type === 1 && privilege_id || type === 2 && privilege_id && valid_date && limit_num) {
                $('button[type=button]').addClass('disabled');
                $('button[type=button]').prop('disabled', true);
                $.ajax({
                    type: "post",
                    url: "/query/modifyprivileges/",
                    dataType: "json",
                    data: {
                        type: type,
                        privilege_id: privilege_id,
                        valid_date: valid_date,
                        limit_num: limit_num
                    },
                    complete: function () {
                        $('button[type=button]').removeClass('disabled');
                        $('button[type=button]').prop('disabled', false);
                    },
                    success: function (data) {
                        if (data.status === 0) {
                            $('#modify_privileges').modal('hide');
                            $('#deleted_privileges').modal('hide');
                            queryuserprivileges()
                        } else {
                            alert(data.msg)
                        }
                    },
                    error: function (XMLHttpRequest, textStatus, errorThrown) {
                        alert(errorThrown);
                    }
                })
            } else {
                alert("Please complete all fields")
            }
        }

        // Initialize data.
        $(document).ready(function () {
            queryuserprivileges();
        });

    </script>
{% endblock %}
