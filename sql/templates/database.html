{% extends "base.html" %}

{% block content %}
    <!-- Custom action buttons -->
    <div style="position: relative">
        <div id="toolbar" class="form-inline pull-left" style="position: absolute;top: 10px">
            <div class="form-group ">
                <select id=instance class="form-control selectpicker" name="instance_list"
                        title="Please select instance"
                        data-live-search="true">
                    <optgroup id="optgroup-mysql" label="MySQL"></optgroup>
                    <optgroup id="optgroup-mongo" label="Mongo"></optgroup>
                </select>
            </div>
            <div class="form-group">
                <select id="saved" class="form-control selectpicker"
                        title="All">
                    <option value="" selected="selected">All</option>
                    <option value="true">Recorded</option>
                </select>
            </div>
            <div class="form-group ">
                <button id="btn-create-database" type="button" class="btn btn-default" disabled="disabled"
                        data-toggle="modal" data-target="#modal-create-database">
                    <span class="glyphicon glyphicon-plus" aria-hidden="true"></span>
                    Create Database
                </button>
            </div>
        </div>
    </div>
    <!-- Table -->
    <div class="table-responsive">
        <table id="database-list" data-toggle="table" class="table table-striped table-hover"
               style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        </table>
    </div>
    <!-- Create database modal -->
    <div class="modal fade" id="modal-create-database" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">Create Database</h4>
                </div>
                <div class="modal-body form-group">
                    <div class="form-group row">
                        <label for="db_name" class="col-sm-3 col-form-label">
                            <span style="color:red">*</span>Database Name</label>
                        <div class="col-sm-9">
                            <input type="text" id="db_name" class="form-control" autocomplete="off"
                                   aria-describedby="dbHelpBlock"
                                   placeholder="Please enter database name">
                            <small id="dbHelpBlock" class="form-text text-muted">
                                Use letters, numbers, underscores, and hyphens.
                                Start with a letter, end with a letter or number, max 64 chars.
                            </small>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="owner" class="col-sm-3 col-form-label">
                            Owner</label>
                        <div class="col-sm-9">
                            <select id="owner" name="owner"
                                    class="selectpicker show-tick form-control bs-select-hidden "
                                    data-live-search="true"
                                    title="Please select database owner"
                                    data-none-selected-text="Please select database owner">
                                {% for user_info in active_user %}
                                    <option value="{{ user_info.username }}">{{ user_info.display }}({{ user_info.username }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="remark" class="col-sm-3 col-form-label">Remark</label>
                        <div class="col-sm-9">
                            <input type="text" id="remark" class="form-control"
                                   autocomplete="off"
                                   placeholder="Please enter remark">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnCreateDb" onclick="create_database()">Create
                    </button>
                </div>
            </div>
        </div>
    </div>
    <!-- Edit database modal -->
    <div class="modal fade" id="modal-edit-database" tabindex="-1" role="dialog">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title">Edit/Record Database Information</h4>
                </div>
                <div class="modal-body form-group">
                    <div class="form-group row">
                        <label for="edit_db_name" class="col-sm-3 col-form-label">
                            <span style="color:red">*</span>Database Name</label>
                        <div class="col-sm-9">
                            <input type="text" id="edit_db_name" class="form-control" autocomplete="off"
                                   readonly="readonly"
                                   aria-describedby="dbHelpBlock"
                                   placeholder="Please enter database name">
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="edit_owner" class="col-sm-3 col-form-label">
                            Owner</label>
                        <div class="col-sm-9">
                            <select id="edit_owner" name="edit_owner"
                                    class="selectpicker show-tick form-control bs-select-hidden "
                                    data-live-search="true"
                                    data-none-selected-text="Please select database owner">
                                {% for user_info in active_user %}
                                    <option value="{{ user_info.username }}">{{ user_info.display }}({{ user_info.username }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label for="edit_remark" class="col-sm-3 col-form-label">Remark</label>
                        <div class="col-sm-9">
                            <input type="text" id="edit_remark" class="form-control"
                                   autocomplete="off"
                                   placeholder="Please enter remark">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnEditDb">Create
                    </button>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}
{% block js %}
    {% load static %}
    <script src="{% static 'bootstrap-table/js/bootstrap-table-export.min.js' %}"></script>
    <script src="{% static 'bootstrap-table/js/tableExport.min.js' %}"></script>
    <script>
        // Get display columns by database type.
        function get_db_columns(db_type) {
            switch (db_type) {
                case 'mysql':
                    return [
                        {
                            title: 'Database Name',
                            field: 'db_name'
                        }, {
                            title: 'Charset',
                            field: 'charset'
                        }, {
                            title: 'Collation',
                            field: 'collation'
                        }, {
                            title: 'Granted Accounts',
                            field: 'grantees',
                            formatter: function (value, row, index) {
                                let grantee = '';
                                for (let i of row.grantees || []) {
                                    grantee += i + '</br>'
                                }
                                return grantee
                            }
                        }, {
                            title: 'Owner',
                            field: 'owner',
                            visible: false,
                        }, {
                            title: 'Owner',
                            field: 'owner_display'
                        }, {
                            title: 'Remark',
                            field: 'remark'
                        }
                    ]
                case 'mongo':
                    return [
                        {
                            title: 'Database Name',
                            field: 'db_name'
                        }, {
                            title: 'Granted Accounts',
                            field: 'grantees',
                            formatter: function (value, row, index) {
                                let grantee = '';
                                for (let i of row.grantees || []) {
                                    grantee += i + '</br>'
                                }
                                return grantee
                            }
                        }, {
                            title: 'Owner',
                            field: 'owner',
                            visible: false,
                        }, {
                            title: 'Owner',
                            field: 'owner_display'
                        }, {
                            title: 'Remark',
                            field: 'remark'
                        }
                    ]
                default:
                    return []
            }
        }

        // Get list data.
        function database_list() {
            // Get selected database instance type.
            let db_type = "";
            if ($("#instance").val()) {
                db_type = $("#instance")[0].options[$("#instance")[0].selectedIndex].getAttribute("instance-type");
            }
            // Initialize table.
            $('#database-list').bootstrapTable('destroy').bootstrapTable({
                escape: true,
                method: 'post',
                contentType: "application/x-www-form-urlencoded",
                url: "/instance/database/list/",
                striped: true,                      // Show row stripe.
                cache: false,                       // Disable cache.
                pagination: true,                   // Enable pagination.
                sortable: true,                     // Enable sorting.
                sortOrder: "asc",                   // Sort order.
                sidePagination: "client",           // Client-side pagination.
                pageNumber: 1,                      // Initial page number.
                pageSize: 20,                       // Rows per page.
                pageList: [20, 30, 50, 100],        // Page size options.
                showExport: true,                   // Show export button.
                exportOptions: {
                    fileName: 'database'  // Export file name.
                },
                search: true,                       // Enable table search.
                strictSearch: false,                // Use fuzzy search.
                showColumns: true,                  // Show column selector.
                showRefresh: true,                  // Show refresh button.
                minimumCountColumns: 2,             // Minimum visible columns.
                clickToSelect: true,                // Enable row selection.
                uniqueId: "db_name",                // Unique row identifier.
                showToggle: true,                   // Show list/card toggle.
                cardView: false,                    // Disable card view.
                detailView: false,                  // Disable detail view.
                locale: 'en-US',                    // Localization.
                queryParamsType: 'limit',
                // Request parameters sent to backend.
                queryParams:
                    function (params) {
                        if ($("#instance").val()) {
                            return {
                                search: params.search,
                                instance_id: $("#instance").val(),
                                saved: $("#saved").val()
                            }
                        }
                    },
                columns: [
                    ...get_db_columns(db_type),
                    {
                        title: 'Action',
                        field: '',
                        formatter: function (value, row, index) {
                            let btn_edit = "<button class=\"btn btn-primary btn-xs\" db_name=\"" + row.db_name + "\" onclick=\"show_edit_modal(this)" + "\">Edit</button>\n";
                            return btn_edit
                        }
                    }],
                onLoadSuccess: function (data) {
                    if (data.status !== 0) {
                        alert("Data loading failed! " + data.msg);
                        $('#btn-create-database').addClass('disabled');
                        $('#btn-create-database').prop('disabled', true);
                    } else if ($("#instance").val()) {
                        $("#btn-create-database").removeClass('disabled');
                        $("#btn-create-database").prop('disabled', false);

                    }
                },
                onLoadError: onLoadErrorCallback,
                onSearch: function (e) {
                    // Send search parameters to server.
                    queryParams(e)
                }
            });

        }

        // On instance change.
        $("#instance").change(function () {
            database_list()
        });

        // On option change.
        $("#saved").change(function () {
            database_list();
            if ($("#instance").val()) {
                database_list();
            }
        });

        // Create database.
        function create_database() {
            if (!$("#instance").val()) {
                alert("Please select instance!");
            } else {
                $.ajax({
                    type: "post",
                    url: "/instance/database/create/",
                    dataType: "json",
                    data: {
                        instance_id: $("#instance").val(),
                        db_name: $("#db_name").val(),
                        owner: $("#owner").val(),
                        remark: $("#remark").val()
                    },
                    complete: function () {
                    },
                    success: function (data) {
                        if (data.status === 0) {
                            $('#modal-create-database').modal('hide');
                            $("#modal-create-database input").val("");
                            database_list()
                        } else {
                            alert(data.msg);
                        }
                    },
                    error: function (XMLHttpRequest, textStatus, errorThrown) {
                        alert(errorThrown);
                    }
                });
            }

        }

        // Edit database.
        function show_edit_modal(obj) {
            let db_name = $(obj).attr("db_name");
            let row_data = $('#database-list').bootstrapTable('getRowByUniqueId', db_name);
            let owner = row_data['owner'];
            let remark = row_data['remark'];
            $("#edit_db_name").val(db_name);
            $("#edit_owner").val(owner);
            $("#edit_owner").selectpicker('refresh');
            $("#edit_remark").val(remark);
            $('#modal-edit-database').modal('show');

            // Update database metadata.
            $("#btnEditDb").unbind("click").click(function () {
                $.ajax({
                    type: "post",
                    url: "/instance/database/edit/",
                    dataType: "json",
                    data: {
                        instance_id: $("#instance").val(),
                        db_name: db_name,
                        owner: $("#edit_owner").val(),
                        remark: $("#edit_remark").val(),
                    },
                    complete: function () {
                    },
                    success: function (data) {
                        if (data.status === 0) {
                            $('#modal-edit-database').modal('hide');
                            $("#modal-edit-database input").val("");
                            database_list()
                        } else {
                            alert(data.msg);
                        }
                    },
                    error: function (XMLHttpRequest, textStatus, errorThrown) {
                        alert(errorThrown);
                    }
                });
            });
        }

        // Initialize data.
        $(document).ready(function () {
            database_list();
            // Get user instance list.
            $(function () {
                $.ajax({
                    type: "get",
                    url: "/group/user_all_instances/",
                    dataType: "json",
                    data: {
                        db_type: ['mysql', 'mongo']
                    },
                    complete: function () {
                    },
                    success: function (data) {
                        if (data.status === 0) {
                            let result = data['data'];
                            $("optgroup[id^='optgroup']").empty();
                            const supportDb = ['mysql', 'mongo']
                            for (let i of result) {
                                let instance = "<option value=\"" + i.id + "\" instance-id=" + i.id + " instance-type=" + i.db_type + ">" + i.instance_name + "</option>";
                                if (supportDb.indexOf(i.db_type) !== -1) {
                                    $("#optgroup-" + i.db_type).append(instance);
                                }
                            }
                            $('#instance').selectpicker('render').selectpicker('refresh');
                        } else {
                            alert(data.msg);
                        }
                    },
                    error: function (XMLHttpRequest, textStatus, errorThrown) {
                        alert(errorThrown);
                    }
                });
            });
        });


    </script>
{% endblock %}
