{% extends "base.html" %}

{% block content %}
    <h4 style="display: inline;">Pending List<span>{{ workflow_detail.workflow_name }}</span></h4>
    &nbsp;&nbsp;&nbsp;
    <hr>
    <!-- Custom action buttons -->
    <div id="toolbar" class="bootstrap-select">
        <select id="workflow_type" class="form-control dropdown-menu-right selectpicker ">
            <option value="0" selected="selected">All</option>
            <option value="1">Query Permission Request</option>
            <option value="2">SQL Release Request</option>
            <option value="3">Data Archive Request</option>
        </select>
    </div>
    <!-- Review list table -->
    <div class="table-responsive">
        <table id="audit-list" data-toggle="table" class="table table-striped table-hover"
               style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
        </table>
    </div>
    <!-- Review confirmation modal -->
    <div class="modal fade" id="auditConfim">
        <div class="modal-dialog" style="width: 400px">
            <div class="modal-content message_align">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">×</span></button>
                    <h4 class="modal-title text-danger">Review Confirmation</h4>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <input type="hidden" id="audit_id">
                        <textarea id="audit_remark" class="form-control" placeholder="Please enter review remarks" rows=4
                                  required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" id="reject" onclick="audit(0)" class="btn btn-danger">Reject</button>
                    <button type="button" id="pass" onclick="audit(1)" class="btn btn-success">Approve</button>
                </div>
            </div>
        </div>
    </div>
{% endblock content %}

{% block js %}
    <script>
        // Get request list.
        function get_auditlist() {
            // Use async request.
            // Initialize table.
            $('#audit-list').bootstrapTable('destroy').bootstrapTable({
                escape: true,
                method: 'post',
                contentType: "application/x-www-form-urlencoded",
                url: "/workflow/list/",
                striped: true,                      // Show row stripe.
                cache: false,                       // Disable cache.
                pagination: true,                   // Enable pagination.
                sortable: true,                     // Enable sorting.
                sortOrder: "asc",                   // Sort order.
                sidePagination: "server",           // Server-side pagination.
                pageNumber: 1,                      // Initial page number.
                pageSize: 20,                       // Rows per page.
                pageList: [20, 30, 50, 100],        // Page size options.
                search: true,                       // Enable table search.
                strictSearch: false,                // Use fuzzy search.
                showColumns: true,                  // Show column selector.
                showRefresh: true,                  // Show refresh button.
                minimumCountColumns: 2,             // Minimum visible columns.
                clickToSelect: true,                // Enable row selection.
                uniqueId: "id",                     // Unique row identifier.
                showToggle: true,                   // Show list/card toggle.
                cardView: false,                    // Disable card view.
                detailView: false,                  // Disable detail view.
                locale: 'en-US',                    // Localization.
                toolbar: "#toolbar",                // Custom toolbar selector.
                queryParamsType: 'limit',
                // Request parameters sent to backend.
                queryParams:
                    function (params) {
                        return {
                            limit: params.limit,
                            offset: params.offset,
                            workflow_type: $("#workflow_type").val(),
                            search: params.search
                        }
                    },
                columns: [{
                    title: 'Request Title',
                    field: 'workflow_title',
                    formatter: function (value, row, index) {
                        return "<a href='/workflow/" + row.audit_id + "/'>" + value + "</a>";
                    }
                }, {
                    title: 'Group',
                    field: 'group_name'
                }, {
                    title: 'Request Type',
                    field: 'workflow_type',
                    formatter: function (value, row, index) {
                        return workflow_type_formatter(value)
                    }
                }, {
                    title: 'Requester',
                    field: 'create_user_display'
                }, {
                    title: 'Request Time',
                    field: 'create_time'
                }, {
                    title: 'Review Status',
                    field: 'current_status',
                    formatter: function (value, row, index) {
                        return workflow_status_formatter(value)
                    }
                }, {
                    title: 'Action',
                    field: 'id',
                    formatter: function (value, row, index) {
                        // Current reviewer.
                        return "<button class=\"btn btn-default btn-xs\" " +
                            "onclick=\"javascrtpt:window.location.href='/workflow/" + row.audit_id + "/'\">" +
                            "Review</button>\n"

                    }
                }],
                onLoadSuccess: function () {
                },
                onLoadError: onLoadErrorCallback,
                onSearch: function (e) {
                    // Send search parameters to server.
                    queryParams(e)
                },
                responseHandler: function (res) {
                    // Transform data before rendering table.
                    return res;
                }
            });

        }

        // Pass audit_id to review modal.
        function getaudit_id(audit_id) {
            $('#audit_id').val(audit_id);
        }

        // Review request.
        function audit(auditstatus) {
            var audit_id = $('#audit_id').val();
            var audit_remark = $("#audit_remark").val();
            var audit_status = auditstatus;

            if (audit_status == 0 && audit_remark == '') {
                alert('Please enter review remarks')
            }
            else {
                $('button[type=button]').addClass('disabled');
                $('button[type=button]').prop('disabled', true);
                $.ajax({
                    type: "post",
                    url: "/workflowaudit/",
                    dataType: "json",
                    data: {
                        audit_id: audit_id,
                        audit_status: audit_status,
                        audit_remark: audit_remark,
                    },
                    complete: function () {
                        $('button[type=button]').removeClass('disabled');
                        $('button[type=button]').prop('disabled', false);
                    },
                    success: function (data) {
                        if (data.status == 0) {
                            $('#auditConfim').modal('hide');
                            location.href = '/workflow/'
                        }
                        else {
                            alert(data.msg);
                        }
                    },
                    error: function (XMLHttpRequest, textStatus, errorThrown) {
                        alert(errorThrown);
                    }
                })

            }

        }

        // Initialize data.
        $(document).ready(function () {
            get_auditlist();
        });
        // Auto-refresh on status filter change.
        $("#workflow_type").change(function () {
            get_auditlist();
        });
    </script>
{% endblock %}
